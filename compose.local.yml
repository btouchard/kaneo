services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kaneo
      POSTGRES_USER: kaneo_user
      POSTGRES_PASSWORD: kaneo_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kaneo_user -d kaneo"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "1337:1337"
    environment:
      - OIDC_CLIENT_ID=1040608905267-nar9pgmc856q1o4ducdv8oe7qqfrs308.apps.googleusercontent.com
      - OIDC_CLIENT_SECRET=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
      - OIDC_DISCOVERY_URL=https://accounts.google.com/.well-known/openid-configuration
      - OIDC_SCOPES=openid profile email
      - JWT_ACCESS=LjEhchYQDNQNC2Zox1d4U97JJTHYN/mgCYzLgDknTx29TBrbES2jEX5BHYdmAh004wcdvLDd4oJVCdjkBoCV/Q==
      - BETTER_AUTH_SECRET=LjEhchYQDNQNC2Zox1d4U97JJTHYN/mgCYzLgDknTx29TBrbES2jEX5BHYdmAh004wcdvLDd4oJVCdjkBoCV/Q==
      - DATABASE_URL=postgresql://kaneo_user:kaneo_password@postgres:5432/kaneo
      - NODE_ENV=development
      - DEBUG=better-auth:*
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "5173:5173"
    environment:
      - KANEO_API_URL=http://localhost:1337
      - KANEO_ENABLED_AUTH=oidc
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
    name: kaneo_postgres_data